{% extends "auth_base.html" %}

{%block "title"%}Sign In{%endblock%}
   
{% block "content"%}
        <div>
             <style>
                
                .msg-error, .msg-info {
                    color: red;
                    }
                .msg-success {
                    color: green;
                    font-weight: bold;
                    }
            </style>

            {% for message in messages %}
            <h5 class="msg-{{ message.tags }}">{{ message }}</h5>
            {% endfor %}
        </div>
        <div>
            <div class="lg:p-12 max-w-md max-w-xl lg:my-0 my-12 mx-auto p-6 space-y-">
                <h1 class="lg:text-3xl text-xl font-semibold  mb-6"> Log in</h1>
                <form action="" method="POST">
                    {% csrf_token %}
                    <input type="text" name="username" placeholder="Username" class="bg-gray-200 mb-2 shadow-none dark:bg-gray-800" style="border: 1px solid #d3d5d8 !important;">
                    <input type="password" name="password" placeholder="***********" class="bg-gray-200 mb-2 shadow-none dark:bg-gray-800" style="border: 1px solid #d3d5d8 !important;">
                    <div class="flex justify-between my-4">
                        <div class="checkbox">
                            <input type="checkbox" id="chekcbox1" checked>
                            <label for="chekcbox1"><span class="checkbox-icon"></span>Remember Me</label>
                        </div>
                        <a href="#"> Forgot Your Password? </a>
                    </div>
                    <button type="submit" class="bg-gradient-to-br from-pink-500 py-3 rounded-md text-white text-xl to-red-400 w-full">Login</button>
                    <div class="text-center mt-5 space-x-2">
                        <p class="text-base"> Not registered? <a href={% url 'signup'%} class=""> Create a account </a></p>
                    </div>
                </form>
            </div>
        </div>
{%endblock%}
